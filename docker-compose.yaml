version: '3.8'

services:
  db:
    image: mariadb:latest
    restart: always
    environment:
      MARIADB_DATABASE: luna_db
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_USER: user
      MARIADB_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://user:password@db:3306/luna_db
      - STATIC_API_KEY=luna
    depends_on:
      - db

volumes:
  mariadb_data:
